<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox C2 Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            /* Жестко заданные темные цвета */
            --bg-color: #08080b;
            --text-color: #ffffff;
            --neon-green: #00ff66;
            --neon-purple: #9d00ff;
        }
        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Анимированный градиент на черном фоне */
            background: radial-gradient(circle at 15% 50%, rgba(0, 255, 102, 0.08), transparent 25%),
                        radial-gradient(circle at 85% 30%, rgba(157, 0, 255, 0.08), transparent 25%);
            background-color: #0a0a0f;
        }
        /* Темное матовое стекло */
        .glass-panel {
            background: rgba(15, 15, 20, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px 25px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 10px rgba(255, 255, 255, 0.02);
        }
        h1 {
            text-align: center;
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 15px rgba(157, 0, 255, 0.6);
        }
        .input-group { margin-bottom: 18px; }
        .input-group label {
            display: block; font-size: 11px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px;
        }
        .input-group input {
            width: 100%; 
            background: rgba(0, 0, 0, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff; 
            padding: 14px; 
            border-radius: 8px; 
            font-size: 14px; 
            box-sizing: border-box; 
            outline: none;
            transition: all 0.3s;
        }
        .input-group input::placeholder {
            color: #555;
        }
        .input-group input:focus { 
            border-color: var(--neon-green); 
            box-shadow: 0 0 12px rgba(0, 255, 102, 0.2); 
            background: rgba(0, 0, 0, 0.8);
        }
        .launch-btn {
            width: 100%; 
            background: linear-gradient(90deg, #00ff66, #00b347); 
            color: #000;
            border: none; 
            padding: 16px; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin-top: 15px;
            box-shadow: 0 5px 20px rgba(0, 255, 102, 0.3);
            transition: all 0.2s;
        }
        .launch-btn:active { 
            transform: scale(0.97); 
            box-shadow: 0 2px 10px rgba(0, 255, 102, 0.2);
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <h1>Fox C2 Sniper</h1>
    
    <div class="input-group">
        <label>URL маркета (Фильтры)</label>
        <input type="text" id="target_url" placeholder="https://tronaccs.market/..." autocomplete="off">
    </div>
    
    <div class="input-group">
        <label>Макс. цена покупки (₽)</label>
        <input type="number" id="max_price" placeholder="Например: 150" autocomplete="off">
    </div>

    <div class="input-group">
        <label>Discord Webhook URL</label>
        <input type="text" id="discord_hook" placeholder="https://discord.com/api/webhooks/..." autocomplete="off">
    </div>

    <button class="launch-btn" onclick="sendData()">🚀 FIRE</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    function sendData() {
        const url = document.getElementById('target_url').value;
        const price = document.getElementById('max_price').value;
        const discord = document.getElementById('discord_hook').value;

        if(!url || !price || !discord) {
            tg.showAlert("Заполни все 3 поля!");
            return;
        }

        tg.HapticFeedback.impactOccurred('heavy');

        const data = {
            action: "snipe",
            url: url,
            price: parseInt(price),
            discord: discord
        };
        
        tg.sendData(JSON.stringify(data));
    }
</script>
</body>
</html>
