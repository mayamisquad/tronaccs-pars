<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox C2 Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #0d0d12;
            --tg-theme-text-color: #ffffff;
            --neon-green: #00ff66;
            --neon-purple: #b537f2;
        }
        body {
            margin: 0;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, rgba(0, 255, 102, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(181, 55, 242, 0.1) 0%, transparent 50%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-purple);
        }
        .input-group { margin-bottom: 15px; }
        .input-group label {
            display: block; font-size: 11px; color: #aaa; margin-bottom: 5px; text-transform: uppercase;
        }
        .input-group input {
            width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 12px; border-radius: 10px; font-size: 14px; box-sizing: border-box; outline: none;
        }
        .input-group input:focus { border-color: var(--neon-green); box-shadow: 0 0 10px rgba(0,255,102,0.2); }
        .launch-btn {
            width: 100%; background: linear-gradient(45deg, #00ff66, #00cc55); color: black;
            border: none; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: bold;
            cursor: pointer; text-transform: uppercase; margin-top: 10px;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
        }
        .launch-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="glass-panel">
    <h1>Fox C2 Sniper</h1>
    
    <div class="input-group">
        <label>URL маркета (Фильтры)</label>
        <input type="text" id="target_url" placeholder="https://tronaccs.market/..." autocomplete="off">
    </div>
    
    <div class="input-group">
        <label>Макс. цена покупки (₽)</label>
        <input type="number" id="max_price" placeholder="Например: 150" autocomplete="off">
    </div>

    <div class="input-group">
        <label>Discord Webhook URL</label>
        <input type="text" id="discord_hook" placeholder="https://discord.com/api/webhooks/..." autocomplete="off">
    </div>

    <button class="launch-btn" onclick="sendData()">🚀 FIRE</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    function sendData() {
        const url = document.getElementById('target_url').value;
        const price = document.getElementById('max_price').value;
        const discord = document.getElementById('discord_hook').value;

        if(!url || !price || !discord) {
            tg.showAlert("Заполни все 3 поля!");
            return;
        }

        tg.HapticFeedback.impactOccurred('heavy');

        const data = {
            action: "snipe",
            url: url,
            price: parseInt(price),
            discord: discord
        };
        
        tg.sendData(JSON.stringify(data));
    }
</script>
</body>
</html>
